<section class="features">

<h2>Contact Us</h2>

<p style="font-size:18px;margin-bottom:30px;">
We'd love to hear from you! Send us your message.
</p>

<form style="max-width:600px;margin:auto;display:flex;flex-direction:column;gap:15px;">

<input type="text" placeholder="Your Name" required
style="padding:15px;border:1px solid #ccc;border-radius:10px;">

<input type="email" placeholder="Your Email" required
style="padding:15px;border:1px solid #ccc;border-radius:10px;">

<input type="text" placeholder="Subject"
style="padding:15px;border:1px solid #ccc;border-radius:10px;">

<textarea rows="6" placeholder="Your Message"
style="padding:15px;border:1px solid #ccc;border-radius:10px;"></textarea>

<button type="button" class="btn" onclick="sendMessage()">
Send Message
</button>

</form>
